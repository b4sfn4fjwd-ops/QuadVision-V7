<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 300 300" width="300" height="300" role="img" aria-label="Team member photo">
  <defs>
    <clipPath id="rr-member1">
      <rect x="4" y="4" width="292" height="292" rx="48" ry="48"/>
    </clipPath>
    <linearGradient id="border-grad-member1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c83f7"/>
      <stop offset="100%" stop-color="#b8bcff"/>
    </linearGradient>
    <filter id="shadow-member1" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#a0a8f0" flood-opacity="0.28"/>
    </filter>
  </defs>
  <!-- shadow ring -->
  <rect x="4" y="4" width="292" height="292" rx="48" ry="48"
        fill="none" stroke="#c8ccff" stroke-width="8"
        filter="url(#shadow-member1)"/>
  <!-- photo -->
  <image href="data:image/jpeg;base64," x="4" y="4" width="292" height="292"
         clip-path="url(#rr-member1)" preserveAspectRatio="xMidYMin slice"/>
  <!-- gradient border overlay -->
  <rect x="4" y="4" width="292" height="292" rx="48" ry="48"
        fill="none" stroke="url(#border-grad-member1)" stroke-width="3" opacity="0.7"/>
</svg>